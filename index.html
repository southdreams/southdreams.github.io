<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>South Dreams</title>
  <meta name="description" content="South Dreams — Iron & Ink, Dirty Road, Soft Rebel, and handmade designs with a gritty outlaw style." />
  <style>
    :root{--bg:#120d0b;--panel:#1e1714;--panel2:#2a1f1a;--text:#f2e6d2;--muted:#c8b39a;--accent:#c85e4c;--accent2:#e2c36f;--line:#4b3a31;--shadow:0 18px 50px rgba(0,0,0,.45)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:radial-gradient(circle at top, #3a2219 0, #120d0b 42%, #090606 100%);color:var(--text);font-family:Georgia, 'Times New Roman', serif}
    a{color:inherit;text-decoration:none} img{max-width:100%;display:block}
    .wrap{width:min(1180px, calc(100% - 32px));margin:0 auto}
    .hero{padding:28px 0 22px;position:relative;overflow:hidden}
    .hero:before{content:'';position:absolute;inset:0;background:linear-gradient(135deg, rgba(255,255,255,.03), transparent 40%);pointer-events:none}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding:8px 0 18px}
    .brandmark{display:flex;align-items:center;gap:14px}
    .brandmark img{width:78px;height:78px;object-fit:cover;border-radius:50%;border:2px solid #70564a;box-shadow:var(--shadow)}
    .brandtext h1{margin:0;font-size:1.7rem;letter-spacing:.08em;text-transform:uppercase}
    .brandtext p{margin:4px 0 0;color:var(--muted);font-size:.96rem}
    .nav{display:flex;gap:14px;flex-wrap:wrap;font-size:.95rem;color:var(--muted)}
    .nav a{padding:8px 12px;border:1px solid transparent;border-radius:999px}.nav a:hover{border-color:var(--line);background:rgba(255,255,255,.03)}
    .heroCard{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;align-items:center;background:linear-gradient(180deg, rgba(42,31,26,.92), rgba(22,16,14,.92));border:1px solid var(--line);border-radius:28px;padding:26px;box-shadow:var(--shadow)}
    .heroCopy h2{margin:0 0 14px;font-size:clamp(2.4rem, 6vw, 5rem);line-height:.95;text-transform:uppercase;letter-spacing:.06em}
    .heroCopy p{margin:0 0 18px;max-width:60ch;color:var(--muted);font-size:1.05rem;line-height:1.6}
    .ctaRow{display:flex;gap:12px;flex-wrap:wrap}
    .btn{display:inline-block;padding:14px 18px;border-radius:999px;border:1px solid var(--line);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:.9rem}
    .btn.primary{background:linear-gradient(180deg,var(--accent),#9f4032);color:#fff}.btn.secondary{background:rgba(255,255,255,.03);color:var(--text)}
    .logoBox{display:flex;justify-content:center;align-items:center;padding:10px}.logoBox img{width:min(100%, 460px);border-radius:20px;border:1px solid #695449;box-shadow:var(--shadow)}
    section{padding:18px 0 0}
    .sectionTitle{display:flex;justify-content:space-between;align-items:end;gap:12px;margin:0 0 14px}
    .sectionTitle h3{margin:0;font-size:1.35rem;text-transform:uppercase;letter-spacing:.08em}
    .sectionTitle span{color:var(--muted);font-size:.95rem}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .card{background:linear-gradient(180deg,var(--panel),#171110);border:1px solid var(--line);border-radius:22px;padding:18px;min-height:160px;box-shadow:var(--shadow)}
    .card h4{margin:0 0 8px;font-size:1.05rem;text-transform:uppercase;letter-spacing:.05em}
    .card p{margin:0;color:var(--muted);line-height:1.55;font-size:.96rem}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .designs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .design{border:1px dashed #6a5549;background:rgba(255,255,255,.03);border-radius:20px;padding:20px;min-height:180px;display:flex;flex-direction:column;justify-content:space-between}
    .design .thumb{height:92px;border-radius:14px;background:linear-gradient(135deg,#2d1f19,#1a1210);border:1px solid #5d493e;display:flex;align-items:center;justify-content:center;color:#c7b39a;text-transform:uppercase;letter-spacing:.08em;font-size:.85rem}
    .design strong{display:block;margin:14px 0 6px;font-size:1.05rem}
    .design small{color:var(--muted);line-height:1.5}
    .coffee{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;background:linear-gradient(90deg, rgba(200,94,76,.2), rgba(226,195,111,.08));border:1px solid #6a4d42;border-radius:22px;padding:18px 20px}
    .coffee p{margin:4px 0 0;color:var(--muted)}
    footer{padding:24px 0 38px;color:var(--muted);font-size:.92rem;text-align:center}
    @media (max-width: 960px){.heroCard,.grid,.split,.designs{grid-template-columns:1fr 1fr}.heroCopy h2{font-size:clamp(2rem, 10vw, 4rem)}}
    @media (max-width: 720px){.heroCard,.grid,.split,.designs{grid-template-columns:1fr}.brandmark img{width:64px;height:64px}.brandtext h1{font-size:1.35rem}}
  </style>
</head>
<body>
  <div class="hero">
    <div class="wrap">
      <div class="topbar">
        <div class="brandmark">
          <img src="./logo.png" alt="South Dreams logo" />
          <div class="brandtext">
            <h1>South Dreams</h1>
            <p>Iron & Ink · Dirty Road · Soft Rebel</p>
          </div>
        </div>
        <nav class="nav">
          <a href="#brands">Brands</a>
          <a href="#designs">Designs</a>
          <a href="#shop">Shop</a>
          <a href="#coffee">Support</a>
        </nav>
      </div>

      <div class="heroCard">
        <div class="heroCopy">
          <h2>Grit, Legacy, and Handmade Rebellion.</h2>
          <p>
            South Dreams is a family of brands built for rough edges, rescued stories,
            and bold design. This space is where the art, the shop, and the legacy all start to live.
          </p>
